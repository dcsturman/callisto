name: Deploy to React application to Firebase Hosting on merge
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'fe/**'
      - '.firebaserc'
      - 'firebase.json'
      - 'firebase.rules'
      - 'firebase.storage.rules'
      - 'firestore.indexes.json'
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/workflows/prod-fe-merge.yml'
env:
  BACKEND_SERVER_URL: https://backend.callistoflight.com
  GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
  SENTRY_DSN_FE: https://d45453f1a934457e87608a2cabaf9bc7@o4511288095080448.ingest.us.sentry.io/4511288499830784
jobs:
  build_and_deploy_fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build node.js
        env:
           CI: false
           VITE_CALLISTO_BACKEND: ${{ env.BACKEND_SERVER_URL }}
           VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
           VITE_SENTRY_DSN: ${{ env.SENTRY_DSN_FE }}
           VITE_SENTRY_ENVIRONMENT: production
           SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        working-directory: ./fe/callisto
        run: npm ci --legacy-peer-deps && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CALLISTO_1731280702227 }}
          channelId: live
          projectId: callisto-1731280702227
          target: prod